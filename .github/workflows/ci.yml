name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint API
        run: pnpm --filter @sophia/api lint

      - name: Lint Web
        run: pnpm --filter @sophia/web lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @sophia/api exec prisma generate

      - name: Build API
        run: pnpm --filter @sophia/api build

      - name: Build Web
        run: pnpm --filter @sophia/web build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sophia_test
          POSTGRES_PASSWORD: sophia_test
          POSTGRES_DB: sophia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U sophia_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://sophia_test:sophia_test@localhost:5432/sophia_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-jwt-secret-32-chars-long
      JWT_REFRESH_SECRET: ci-test-refresh-secret-32-chars!
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      FRONTEND_URL: http://localhost:3000
      PORT: 3001
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @sophia/api exec prisma generate

      - name: Run Prisma migrations
        run: pnpm --filter @sophia/api exec prisma migrate deploy

      - name: Run tests
        run: pnpm --filter @sophia/api test
